<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1520" width="1000" height="1520" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c44"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4a4"/>
    </marker>
    <linearGradient id="phase1-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f0fe"/>
      <stop offset="100%" stop-color="#d2e3fc"/>
    </linearGradient>
    <linearGradient id="phase2-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef3e0"/>
      <stop offset="100%" stop-color="#fde8c8"/>
    </linearGradient>
    <linearGradient id="phase3-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f5e9"/>
      <stop offset="100%" stop-color="#c8e6c9"/>
    </linearGradient>
    <linearGradient id="phase4-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f3e5f5"/>
      <stop offset="100%" stop-color="#e1bee7"/>
    </linearGradient>
    <linearGradient id="phase5-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff3e0"/>
      <stop offset="100%" stop-color="#ffe0b2"/>
    </linearGradient>
    <linearGradient id="phase6-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fce4ec"/>
      <stop offset="100%" stop-color="#f8bbd0"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#222">Claude Scholar Research Pipeline</text>
  <text x="500" y="58" text-anchor="middle" font-size="13" fill="#666">19-step orchestrator with project directory isolation (v2)</text>

  <!-- Project Init Box -->
  <rect x="300" y="75" width="400" height="50" rx="8" fill="#f5f5f5" stroke="#999" stroke-width="1.5"/>
  <text x="500" y="96" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">/new-project &lt;topic&gt;</text>
  <text x="500" y="113" text-anchor="middle" font-size="11" fill="#666">Creates projects/&lt;slug&gt;/ + pipeline-state.json (project_dir)</text>
  <line x1="500" y1="125" x2="500" y2="145" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ============ PHASE 1: Research Ideation ============ -->
  <rect x="40" y="150" width="920" height="195" rx="12" fill="url(#phase1-bg)" stroke="#4a86c8" stroke-width="1.5"/>
  <text x="60" y="175" font-size="14" font-weight="bold" fill="#2a5db0">Phase 1: Research Ideation</text>
  <text x="940" y="175" text-anchor="end" font-size="11" fill="#5a8ac0">Day 1-3 | Online steps</text>

  <!-- Step 1 -->
  <rect x="70" y="190" width="260" height="55" rx="6" fill="#fff" stroke="#4a86c8" stroke-width="1"/>
  <text x="80" y="210" font-size="12" font-weight="bold" fill="#2a5db0">1. /research-init</text>
  <text x="80" y="226" font-size="10" fill="#555">Literature review, gap analysis, hypotheses</text>
  <text x="80" y="238" font-size="9" fill="#888">Output: $PROJECT_DIR/docs/literature-review.md</text>

  <!-- Step 2 -->
  <rect x="370" y="190" width="260" height="55" rx="6" fill="#fff" stroke="#4a86c8" stroke-width="1"/>
  <text x="380" y="210" font-size="12" font-weight="bold" fill="#2a5db0">2. /check-competition</text>
  <text x="380" y="226" font-size="10" fill="#555">Competitive landscape check</text>
  <text x="380" y="238" font-size="9" fill="#888">Requires: online access</text>

  <!-- Novelty/Hypothesis block -->
  <rect x="670" y="190" width="260" height="55" rx="6" fill="#fff" stroke="#4a86c8" stroke-width="1"/>
  <text x="680" y="210" font-size="12" font-weight="bold" fill="#2a5db0">Novelty + Hypotheses</text>
  <text x="680" y="226" font-size="10" fill="#555">novelty-assessment, hypothesis-formulation</text>
  <text x="680" y="238" font-size="9" fill="#888">Output: $PROJECT_DIR/docs/hypotheses.md</text>

  <!-- Arrows between phase 1 steps -->
  <line x1="330" y1="217" x2="368" y2="217" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="630" y1="217" x2="668" y2="217" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Decision diamond -->
  <polygon points="500,260 540,280 500,300 460,280" fill="#fff" stroke="#c44" stroke-width="1.5"/>
  <text x="500" y="284" text-anchor="middle" font-size="9" font-weight="bold" fill="#c44">Novel?</text>
  <text x="555" y="275" font-size="9" fill="#4a4">Yes</text>
  <text x="445" y="275" font-size="9" fill="#c44">No: iterate</text>

  <line x1="500" y1="300" x2="500" y2="355" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ============ PHASE 2: Experiment Design ============ -->
  <rect x="40" y="360" width="920" height="100" rx="12" fill="url(#phase2-bg)" stroke="#c08030" stroke-width="1.5"/>
  <text x="60" y="385" font-size="14" font-weight="bold" fill="#8b5e14">Phase 2: Experiment Design</text>
  <text x="940" y="385" text-anchor="end" font-size="11" fill="#b08030">Day 3-4</text>

  <!-- Step 3 -->
  <rect x="70" y="400" width="860" height="45" rx="6" fill="#fff" stroke="#c08030" stroke-width="1"/>
  <text x="80" y="420" font-size="12" font-weight="bold" fill="#8b5e14">3. /design-experiments</text>
  <text x="310" y="420" font-size="10" fill="#555">Baselines, ablations, sample size, resource estimation, success criteria</text>
  <text x="80" y="435" font-size="9" fill="#888">Prereq: docs/hypotheses.md | Output: $PROJECT_DIR/docs/experiment-plan.md, $PROJECT_DIR/experiment-state.json</text>

  <line x1="500" y1="460" x2="500" y2="480" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ============ PHASE 3: Implementation ============ -->
  <rect x="40" y="485" width="920" height="195" rx="12" fill="url(#phase3-bg)" stroke="#3a8a3a" stroke-width="1.5"/>
  <text x="60" y="510" font-size="14" font-weight="bold" fill="#2a6a2a">Phase 3: Implementation</text>
  <text x="940" y="510" text-anchor="end" font-size="11" fill="#4a8a4a">Day 4-7</text>

  <!-- Step 4 -->
  <rect x="70" y="525" width="200" height="45" rx="6" fill="#fff" stroke="#3a8a3a" stroke-width="1"/>
  <text x="80" y="543" font-size="12" font-weight="bold" fill="#2a6a2a">4. /scaffold</text>
  <text x="80" y="558" font-size="10" fill="#555">pyproject.toml, src/, configs/</text>

  <!-- Step 5 -->
  <rect x="290" y="525" width="200" height="45" rx="6" fill="#fff" stroke="#3a8a3a" stroke-width="1"/>
  <text x="300" y="543" font-size="12" font-weight="bold" fill="#2a6a2a">5. /build-data</text>
  <text x="300" y="558" font-size="10" fill="#555">Dataset generators/loaders</text>

  <!-- Step 6 -->
  <rect x="510" y="525" width="200" height="45" rx="6" fill="#fff" stroke="#3a8a3a" stroke-width="1"/>
  <text x="520" y="543" font-size="12" font-weight="bold" fill="#2a6a2a">6. /setup-model</text>
  <text x="520" y="558" font-size="10" fill="#555">Model load, hooks, surgery</text>

  <!-- Step 7 -->
  <rect x="730" y="525" width="200" height="45" rx="6" fill="#fff" stroke="#3a8a3a" stroke-width="1"/>
  <text x="740" y="543" font-size="12" font-weight="bold" fill="#2a6a2a">7. /implement-metrics</text>
  <text x="740" y="558" font-size="10" fill="#555">Metrics, statistical tests</text>

  <!-- Arrows -->
  <line x1="270" y1="547" x2="288" y2="547" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="490" y1="547" x2="508" y2="547" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="710" y1="547" x2="728" y2="547" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Step 8 -->
  <rect x="70" y="585" width="860" height="45" rx="6" fill="#fff" stroke="#3a8a3a" stroke-width="1"/>
  <text x="80" y="603" font-size="12" font-weight="bold" fill="#2a6a2a">8. /validate-setup</text>
  <text x="260" y="603" font-size="10" fill="#555">Pre-flight: data integrity, model loading, metric correctness, ablation sanity, smoke test</text>
  <text x="80" y="618" font-size="9" fill="#888">Output: $PROJECT_DIR/docs/validation-report.md | GATE: all checks must pass before sweep</text>

  <!-- Down arrow into step 8 -->
  <path d="M 500,570 L 500,583" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="500" y1="630" x2="500" y2="655" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ============ PHASE 4: Execution ============ -->
  <rect x="40" y="660" width="920" height="175" rx="12" fill="url(#phase4-bg)" stroke="#7b3e9e" stroke-width="1.5"/>
  <text x="60" y="685" font-size="14" font-weight="bold" fill="#5a2d7a">Phase 4: Execution</text>
  <text x="940" y="685" text-anchor="end" font-size="11" fill="#8a5aaa">Day 7-14+ | SLURM cluster</text>

  <!-- Step 9 -->
  <rect x="70" y="700" width="270" height="45" rx="6" fill="#fff" stroke="#7b3e9e" stroke-width="1"/>
  <text x="80" y="718" font-size="12" font-weight="bold" fill="#5a2d7a">9. /plan-compute</text>
  <text x="80" y="733" font-size="10" fill="#555">GPU estimation, SLURM scripts</text>

  <!-- Step 10 -->
  <rect x="370" y="700" width="270" height="45" rx="6" fill="#fff" stroke="#7b3e9e" stroke-width="1"/>
  <text x="380" y="718" font-size="12" font-weight="bold" fill="#5a2d7a">10. /run-experiment</text>
  <text x="380" y="733" font-size="10" fill="#555">Submit matrix, phased gates, recovery</text>

  <!-- Step 11 -->
  <rect x="670" y="700" width="260" height="45" rx="6" fill="#fff" stroke="#7b3e9e" stroke-width="1"/>
  <text x="680" y="718" font-size="12" font-weight="bold" fill="#5a2d7a">11. /collect-results</text>
  <text x="680" y="733" font-size="10" fill="#555">Aggregate outputs to tables</text>

  <!-- Arrows -->
  <line x1="340" y1="722" x2="368" y2="722" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="640" y1="722" x2="668" y2="722" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Iteration loop -->
  <rect x="670" y="760" width="260" height="55" rx="6" fill="#fff3f3" stroke="#c44" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="680" y="780" font-size="11" font-weight="bold" fill="#c44">Iteration Loop (on gate failure)</text>
  <text x="680" y="795" font-size="9" fill="#888">failure-diagnosis -> hypothesis-revision</text>
  <text x="680" y="807" font-size="9" fill="#888">PIVOT / PERSEVERE / ABANDON</text>

  <!-- Iteration arrow back to Phase 2 -->
  <path d="M 930,787 L 960,787 L 960,430 L 940,430" stroke="#c44" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arrow-red)"/>
  <text x="965" y="600" font-size="9" fill="#c44" transform="rotate(-90, 965, 600)">iterate back</text>

  <line x1="500" y1="835" x2="500" y2="860" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ============ PHASE 5: Analysis & Writing ============ -->
  <rect x="40" y="865" width="920" height="280" rx="12" fill="url(#phase5-bg)" stroke="#c07020" stroke-width="1.5"/>
  <text x="60" y="890" font-size="14" font-weight="bold" fill="#8b5014">Phase 5: Analysis &amp; Writing</text>
  <text x="940" y="890" text-anchor="end" font-size="11" fill="#c08030">Day 14-21</text>

  <!-- Step 12 -->
  <rect x="70" y="905" width="860" height="40" rx="6" fill="#fff" stroke="#c07020" stroke-width="1"/>
  <text x="80" y="923" font-size="12" font-weight="bold" fill="#8b5014">12. /analyze-results</text>
  <text x="280" y="923" font-size="10" fill="#555">Statistical tests, confidence intervals, effect sizes, scientific figures</text>
  <text x="80" y="937" font-size="9" fill="#888">Output: $PROJECT_DIR/docs/analysis-report.md, $PROJECT_DIR/results/figures/</text>

  <!-- Steps 13-15 row -->
  <rect x="70" y="960" width="270" height="45" rx="6" fill="#fff" stroke="#c07020" stroke-width="1"/>
  <text x="80" y="978" font-size="12" font-weight="bold" fill="#8b5014">13. /map-claims</text>
  <text x="80" y="993" font-size="10" fill="#555">Claims to evidence mapping</text>

  <rect x="370" y="960" width="270" height="45" rx="6" fill="#fff" stroke="#c07020" stroke-width="1"/>
  <text x="380" y="978" font-size="12" font-weight="bold" fill="#8b5014">14. /position</text>
  <text x="380" y="993" font-size="10" fill="#555">Contribution vs. prior work</text>

  <rect x="670" y="960" width="260" height="45" rx="6" fill="#fff" stroke="#c07020" stroke-width="1"/>
  <text x="680" y="978" font-size="12" font-weight="bold" fill="#8b5014">15. /story</text>
  <text x="680" y="993" font-size="10" fill="#555">Narrative arc, paper blueprint</text>

  <line x1="340" y1="982" x2="368" y2="982" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="640" y1="982" x2="668" y2="982" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Step 16 -->
  <rect x="70" y="1020" width="860" height="40" rx="6" fill="#fff" stroke="#c07020" stroke-width="1"/>
  <text x="80" y="1038" font-size="12" font-weight="bold" fill="#8b5014">16. /produce-manuscript</text>
  <text x="310" y="1038" font-size="10" fill="#555">Publication-quality figures, full prose, LaTeX source, submission package</text>
  <text x="80" y="1053" font-size="9" fill="#888">Output: $PROJECT_DIR/manuscript/main.tex, figures/</text>

  <!-- Step 17 -->
  <rect x="70" y="1075" width="420" height="50" rx="6" fill="#fff" stroke="#c07020" stroke-width="1.5"/>
  <text x="80" y="1093" font-size="12" font-weight="bold" fill="#c44">17. /quality-review</text>
  <text x="80" y="1108" font-size="10" fill="#555">8-dimension review gate (BLOCKS if any critical dim &lt; 6/10)</text>
  <text x="80" y="1120" font-size="9" fill="#888">GATE: all dims >= 5, critical dims >= 6</text>

  <!-- Step 18 -->
  <rect x="520" y="1075" width="410" height="50" rx="6" fill="#fff" stroke="#c07020" stroke-width="1"/>
  <text x="530" y="1093" font-size="12" font-weight="bold" fill="#8b5014">18. /compile-manuscript</text>
  <text x="530" y="1108" font-size="10" fill="#555">LaTeX -> PDF, Overleaf ZIP package</text>
  <text x="530" y="1120" font-size="9" fill="#888">tectonic | pdflatex | xelatex</text>

  <line x1="490" y1="1100" x2="518" y2="1100" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <line x1="500" y1="1145" x2="500" y2="1165" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ============ PHASE 6: Review & Submit ============ -->
  <rect x="40" y="1170" width="920" height="100" rx="12" fill="url(#phase6-bg)" stroke="#b03060" stroke-width="1.5"/>
  <text x="60" y="1195" font-size="14" font-weight="bold" fill="#8b1a4a">Phase 6: Review &amp; Submit</text>
  <text x="940" y="1195" text-anchor="end" font-size="11" fill="#c04070">Day 21-28</text>

  <!-- Step 19 -->
  <rect x="70" y="1210" width="280" height="45" rx="6" fill="#fff" stroke="#b03060" stroke-width="1"/>
  <text x="80" y="1228" font-size="12" font-weight="bold" fill="#8b1a4a">19. /rebuttal</text>
  <text x="80" y="1243" font-size="10" fill="#555">Systematic reviewer responses</text>

  <!-- Post-acceptance -->
  <rect x="380" y="1210" width="190" height="45" rx="6" fill="#fff" stroke="#b03060" stroke-width="1"/>
  <text x="390" y="1228" font-size="12" font-weight="bold" fill="#8b1a4a">/presentation</text>
  <text x="390" y="1243" font-size="10" fill="#555">Slides + speaker notes</text>

  <rect x="590" y="1210" width="150" height="45" rx="6" fill="#fff" stroke="#b03060" stroke-width="1"/>
  <text x="600" y="1228" font-size="12" font-weight="bold" fill="#8b1a4a">/poster</text>
  <text x="600" y="1243" font-size="10" fill="#555">Academic poster</text>

  <rect x="760" y="1210" width="170" height="45" rx="6" fill="#fff" stroke="#b03060" stroke-width="1"/>
  <text x="770" y="1228" font-size="12" font-weight="bold" fill="#8b1a4a">/promote</text>
  <text x="770" y="1243" font-size="10" fill="#555">Twitter, LinkedIn, blog</text>

  <!-- ============ Infrastructure Legend ============ -->
  <rect x="40" y="1300" width="920" height="200" rx="12" fill="#fafafa" stroke="#ccc" stroke-width="1"/>
  <text x="60" y="1325" font-size="14" font-weight="bold" fill="#333">Infrastructure</text>

  <!-- State tracking -->
  <rect x="60" y="1340" width="280" height="80" rx="6" fill="#f5f5f5" stroke="#999" stroke-width="1"/>
  <text x="70" y="1358" font-size="11" font-weight="bold" fill="#333">State Tracking</text>
  <text x="70" y="1375" font-size="10" fill="#555">pipeline-state.json (v2, gitignored)</text>
  <text x="70" y="1390" font-size="10" fill="#555">experiment-state.json (in $PROJECT_DIR)</text>
  <text x="70" y="1405" font-size="10" fill="#555">project_dir = projects/&lt;slug&gt;/</text>

  <!-- Orchestrator modes -->
  <rect x="360" y="1340" width="280" height="80" rx="6" fill="#f5f5f5" stroke="#999" stroke-width="1"/>
  <text x="370" y="1358" font-size="11" font-weight="bold" fill="#333">/run-pipeline Modes</text>
  <text x="370" y="1375" font-size="10" fill="#555">--auto | --resume | --from &lt;step&gt;</text>
  <text x="370" y="1390" font-size="10" fill="#555">--status | --reset | --skip-online</text>
  <text x="370" y="1405" font-size="10" fill="#555">Interactive: Continue / Skip / Abort</text>

  <!-- Hooks & guards -->
  <rect x="660" y="1340" width="280" height="80" rx="6" fill="#f5f5f5" stroke="#999" stroke-width="1"/>
  <text x="670" y="1358" font-size="11" font-weight="bold" fill="#333">Hooks &amp; Guards</text>
  <text x="670" y="1375" font-size="10" fill="#555">session-start: pipeline progress display</text>
  <text x="670" y="1390" font-size="10" fill="#555">research-doc-guard: root write warning</text>
  <text x="670" y="1405" font-size="10" fill="#555">security-guard: key/secret detection</text>

  <!-- Project directory structure -->
  <rect x="60" y="1435" width="890" height="50" rx="6" fill="#e8f5e9" stroke="#4a8a4a" stroke-width="1"/>
  <text x="70" y="1455" font-size="11" font-weight="bold" fill="#2a6a2a">Project Directory: projects/&lt;slug&gt;/</text>
  <text x="70" y="1475" font-size="10" fill="#555" font-family="monospace">docs/ | configs/ | src/ | data/ | results/{tables,figures} | manuscript/ | logs/ | notebooks/</text>
</svg>
