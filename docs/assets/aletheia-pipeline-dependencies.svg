<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" width="960" height="420" role="img" aria-labelledby="dep-title dep-desc">
  <title id="dep-title">ALETHEIA v3 ť data and control dependencies between phases</title>
  <desc id="dep-desc">Solid arrows: primary artifact flow. Dashed red: novelty and quality feedback loops with gate labels.</desc>
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <marker id="a-solid" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <marker id="a-dash" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,5 L7,2.5 z" fill="#b91c1c"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg2)"/>
  <text x="480" y="28" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="15" font-weight="600" fill="#0f172a">ALETHEIA v3 — artifact dependencies (not only step order)</text>
  <text x="480" y="48" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="10.5" fill="#64748b">Solid = main document/data flow · Dashed = gates &amp; revision loops (counters in pipeline-state.json)</text>

  <!-- Inputs -->
  <rect x="24" y="68" width="140" height="52" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="94" y="90" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" font-weight="700" fill="#92400e">Pre-pipeline inputs</text>
  <text x="94" y="108" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="8.5" fill="#78350f">slug · research_topic · optional hints</text>

  <!-- Phase nodes (abbrev) -->
  <g font-family="Segoe UI, sans-serif">
    <rect x="200" y="64" width="100" height="60" rx="8" fill="#ffffff" stroke="#818cf8" stroke-width="2"/>
    <text x="250" y="88" text-anchor="middle" font-size="11" font-weight="700" fill="#1e293b">P1 Research</text>
    <text x="250" y="106" text-anchor="middle" font-size="8" fill="#475569">landscape ? claims</text>

    <rect x="330" y="64" width="100" height="60" rx="8" fill="#ffffff" stroke="#818cf8" stroke-width="2"/>
    <text x="380" y="88" text-anchor="middle" font-size="11" font-weight="700" fill="#1e293b">P2 Design</text>
    <text x="380" y="106" text-anchor="middle" font-size="8" fill="#475569">hypotheses ? plan</text>

    <rect x="460" y="64" width="100" height="60" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="510" y="88" text-anchor="middle" font-size="11" font-weight="700" fill="#1e293b">P3 Build</text>
    <text x="510" y="106" text-anchor="middle" font-size="8" fill="#475569">code ? configs</text>

    <rect x="590" y="64" width="100" height="60" rx="8" fill="#ecfdf5" stroke="#34d399" stroke-width="2"/>
    <text x="640" y="88" text-anchor="middle" font-size="11" font-weight="700" fill="#1e293b">P4 Execute</text>
    <text x="640" y="106" text-anchor="middle" font-size="8" fill="#475569">runs ? results</text>

    <rect x="720" y="52" width="110" height="84" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="775" y="78" text-anchor="middle" font-size="11" font-weight="700" fill="#1e293b">P5 Analyze</text>
    <text x="775" y="94" text-anchor="middle" font-size="8" fill="#475569">analysis ? claims</text>
    <text x="775" y="110" text-anchor="middle" font-size="8" fill="#475569">story ? manuscript</text>
    <text x="775" y="126" text-anchor="middle" font-size="8" font-weight="600" fill="#b45309">N3 ť verify-paper</text>

    <rect x="858" y="64" width="78" height="60" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="897" y="88" text-anchor="middle" font-size="11" font-weight="700" fill="#1e293b">P6 Submit</text>
    <text x="897" y="106" text-anchor="middle" font-size="8" fill="#475569">N4 ť PDF</text>
  </g>

  <!-- Solid arrows with labels -->
  <g fill="none" stroke="#334155" stroke-width="1.4" marker-end="url(#a-solid)" font-family="Segoe UI, sans-serif" font-size="7.5" fill-opacity="1">
    <path d="M 166 94 L 198 94"/>
    <text x="182" y="88" text-anchor="middle" fill="#334155" stroke="none" font-size="7.5">topic</text>
    <path d="M 302 94 L 328 94"/>
    <text x="314" y="88" text-anchor="middle" fill="#334155" stroke="none" font-size="7.5">landscape.md</text>
    <path d="M 432 94 L 458 94"/>
    <text x="444" y="88" text-anchor="middle" fill="#334155" stroke="none" font-size="7.5">experiment-plan.md</text>
    <path d="M 562 94 L 588 94"/>
    <text x="574" y="88" text-anchor="middle" fill="#334155" stroke="none" font-size="7.5">configs ť src</text>
    <path d="M 692 94 L 718 94"/>
    <text x="704" y="88" text-anchor="middle" fill="#334155" stroke="none" font-size="7.5">results/</text>
    <path d="M 832 94 L 856 94"/>
    <text x="842" y="88" text-anchor="middle" fill="#334155" stroke="none" font-size="7.5">manuscript/</text>
  </g>

  <!-- Artifact strip -->
  <text x="480" y="158" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" font-weight="600" fill="#334155">Key artifacts (under $PROJECT_DIR)</text>
  <rect x="40" y="168" width="880" height="36" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="480" y="190" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="8.2" fill="#475569">docs/research-landscape.md ? docs/hypotheses.md ? docs/experiment-plan.md ? results/tables ? experiment-state.json ? docs/analysis-report.md ? docs/paper-blueprint.md ? manuscript/*.tex</text>

  <!-- Feedback loops -->
  <g fill="none" stroke="#b91c1c" stroke-width="1.2" stroke-dasharray="6 4" marker-end="url(#a-dash)">
    <path d="M 250 64 Q 250 24 94 24 Q 40 24 40 66"/>
    <path d="M 380 64 Q 380 32 200 32 Q 180 32 180 64"/>
    <path d="M 640 148 Q 640 200 380 200 Q 330 200 330 128"/>
    <path d="M 775 148 Q 720 220 640 220 Q 510 220 510 128"/>
    <path d="M 897 64 Q 920 40 920 200 Q 920 260 775 260 Q 400 260 250 260 Q 200 260 200 128"/>
  </g>
  <g font-family="Segoe UI, sans-serif" font-size="8" fill="#991b1b">
    <text x="120" y="18">N1 ? P1 or P2</text>
    <text x="260" y="18">N2 ? P2</text>
    <text x="480" y="212">gap / narrative loops ? P2 or re-analysis</text>
    <text x="600" y="232">verify-paper loop ? P5 blocks</text>
    <text x="780" y="280">adversarial review ? upstream</text>
  </g>

  <!-- Legend -->
  <rect x="24" y="300" width="912" height="100" rx="8" fill="#ffffff" stroke="#94a3b8"/>
  <text x="40" y="324" font-family="Segoe UI, sans-serif" font-size="10" font-weight="700" fill="#0f172a">How this relates to pipeline-state.json</text>
  <text x="40" y="346" font-family="Segoe UI, sans-serif" font-size="8.5" fill="#475569">ť Inputs (schema: docs/schemas/pipeline-inputs.schema.json) populate project_dir, research_topic, and defaults ť see docs/PIPELINE_INPUTS.md.</text>
  <text x="40" y="364" font-family="Segoe UI, sans-serif" font-size="8.5" fill="#475569">ť Step completion and loop counters (reposition_count, design_novelty_loops, ť) are runtime state ť not duplicated in the input schema.</text>
  <text x="40" y="382" font-family="Segoe UI, sans-serif" font-size="8.5" fill="#475569">ť Epistemic files under .epistemic/ evolve along the solid artifact chain; guards (registry freshness, consistency oracle) enforce consistency before late P5 steps.</text>
</svg>
