# M4b: BERT-base + sparsemax + top-6 heads (importance) + MSE
# PRIMARY PROPOSED METHOD — 10 seeds (vs 5 for ablations)
# Requires: importance_scores_path pointing to Phase 1 output
condition: M4b
description: "Sparsemax top-6 heads MSE (primary proposed method)"

use_head_selection: true
use_sparsemax: true
use_alignment_loss: true
alignment_loss_type: mse
alignment_loss_weight: 0.1
top_k_heads: 6
importance_scores_path: outputs/phase1/importance_scores.pt
fixed_supervised_heads: []
