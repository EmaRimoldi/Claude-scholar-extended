# M1: SRA replication (Eilertsen et al. 2025, arXiv:2511.07065)
# BERT-base + softmax + fixed head (8,7) + MSE alignment loss
condition: M1
description: "SRA replication (Eilertsen et al. 2025)"

use_head_selection: false
use_sparsemax: false
use_alignment_loss: true
alignment_loss_type: mse
alignment_loss_weight: 0.1
top_k_heads: 0
importance_scores_path: null
# Fixed head: layer 8, head 7 (as reported in Eilertsen et al. 2025)
fixed_supervised_heads:
  - [8, 7]
