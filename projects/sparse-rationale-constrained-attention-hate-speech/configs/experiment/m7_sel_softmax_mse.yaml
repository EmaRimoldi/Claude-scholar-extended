# M7: BERT-base + softmax + top-6 heads (importance) + MSE
# Head selection without sparsemax — isolates C1 (selection) from C2 (sparsemax)
condition: M7
description: "Softmax top-6 heads MSE (head selection without sparsemax)"

use_head_selection: true
use_sparsemax: false
use_alignment_loss: true
alignment_loss_type: mse
alignment_loss_weight: 0.1
top_k_heads: 6
importance_scores_path: outputs/phase1/importance_scores.pt
fixed_supervised_heads: []
