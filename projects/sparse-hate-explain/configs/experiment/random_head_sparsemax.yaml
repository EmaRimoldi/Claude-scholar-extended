# @package _global_
# B5: Random head selection — control for importance scoring (H4).
# top_k=24 heads selected randomly (different per seed via seed-controlled sampling).
# Must be paired with a seed-specific head list; see scripts/select_random_heads.py.
model:
  attention_transform: sparsemax
  supervised_heads: random  # resolved at runtime from seed-specific random head list
  lambda_attn: 1.0
  attn_loss_type: mse
  top_k: 24
