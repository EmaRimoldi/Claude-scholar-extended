# @package _global_
# B3: SMRA replication — sparsemax supervision, all heads, KL loss, HateXplain.
# Replicates arXiv:2601.03481 setup.
# Note: SMRA uses moral-value annotation subset; we use full majority-vote rationales.
# This deviation is documented in method-reconciliation-report.md.
model:
  attention_transform: sparsemax
  supervised_heads: "all"
  lambda_attn: 1.0
  attn_loss_type: kl
