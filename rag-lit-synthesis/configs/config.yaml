defaults:
  - _self_

project:
  name: rag-lit-synthesis
  seed: 42
  output_dir: outputs

data:
  benchmark_dir: data/benchmark
  num_topics: 5
  papers_per_topic: 50
  corpus_source: semantic_scholar

retrieval:
  conditions:
    - bm25
    - dense
    - no_retrieval
  top_k: 10
  dense_model: all-MiniLM-L6-v2

generation:
  models:
    - google/flan-t5-large
    - google/flan-t5-xl
  fallback: template
  temperature: 0.3
  max_tokens: 512

evaluation:
  metrics:
    - citation_precision
    - citation_recall
    - rouge_l
    - bertscore_f1
    - retrieval_precision_at_10
    - retrieval_ndcg_at_10
  seeds: [42]
